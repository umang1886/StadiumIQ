server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # React routing fix
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 🔥 FIXED API PROXY
    location /api {
        proxy_pass https://stadiumiq2-431787934472.asia-south1.run.app;

        # Do NOT set Host to $host for Cloud Run, or it routes to the wrong service!
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Enable SNI for HTTPS to external services (Required by Cloud Run)
        proxy_ssl_server_name on;
    }
}